<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is my table exercise">
    <title>Tables</title>
</head>
<body>
    <table>
        <caption>Q1: 2024 Sales Performance by region</caption>
        <colgroup>
            <col style="width:30%;" />
            <col style="width:20%;" />
            <col style="width:20%;" />
            <col style="width:30%;" />
        </colgroup>
        <thead>
            <tr>
                <th scope="col">Region</th>
                <th scope="col">Q1 target</th>
                <th scope="col">Q1 ACTUAL</th>
                <th scope="col">Q1 VARIANCE</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">North America</th>
                <td>1000000</td>
                <td>1200000</td>
                <td>200000</td>
            </tr>
            <tr>
                <th scope="row">Europe</th>
                <td>800000</td>
                <td>900000</td>
                <td>100000</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th scope="row">Total</th>
                <td>1800000</td>
                <td>2100000</td>
                <td>300000</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
